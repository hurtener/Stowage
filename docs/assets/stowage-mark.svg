<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Stowage mark">
  <title>Stowage</title>
  <defs>
    <linearGradient id="hull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EAF9F5"/>
      <stop offset="1" stop-color="#CDEFE7"/>
    </linearGradient>
  </defs>

  <!-- water -->
  <g stroke="#34D3C0" stroke-width="3.4" stroke-linecap="round" fill="none">
    <path d="M16 110 q8 -7 16 0 q8 7 16 0 q8 -7 16 0 q8 7 16 0 q8 -7 16 0" opacity="0.95"/>
    <path d="M24 119 q8 -6 16 0 q8 6 16 0 q8 -6 16 0 q8 6 16 0" opacity="0.5"/>
  </g>

  <!-- hull (bow view) -->
  <path d="M24 82 H104 L92 104 q-2 5 -8 5 H40 q-6 0 -8 -5 Z"
        fill="url(#hull)" stroke="#0E2A47" stroke-width="3.6" stroke-linejoin="round"/>

  <!-- cargo hold + bridge band (one navy mass) -->
  <rect x="34" y="40" width="60" height="42" rx="7" fill="#0E2A47"/>
  <rect x="46" y="28" width="36" height="16" rx="4" fill="#0E2A47"/>

  <!-- funnel / bridge cap -->
  <rect x="52" y="13" width="24" height="17" rx="6" fill="#5BE3D3"/>

  <!-- porthole -->
  <circle cx="64" cy="36" r="4.4" fill="#F5A623" stroke="#0B2238" stroke-width="1.5"/>

  <!-- containers, pyramid 1–2–3 -->
  <g fill="#34D3C0" stroke="#0B2238" stroke-width="1.4" stroke-linejoin="round">
    <rect x="57" y="48" width="14" height="10" rx="2"/>
    <rect x="48.5" y="59" width="14" height="10" rx="2"/>
    <rect x="65.5" y="59" width="14" height="10" rx="2"/>
    <rect x="40" y="70" width="14" height="10" rx="2"/>
    <rect x="57" y="70" width="14" height="10" rx="2"/>
    <rect x="74" y="70" width="14" height="10" rx="2"/>
  </g>
</svg>
