version: "2"

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gosec
    - errorlint
    - contextcheck
  settings:
    revive:
      rules:
        - name: package-comments

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true
