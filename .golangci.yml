version: "2"

linters:
  default: standard
  exclusions:
    rules:
      # Tests read/write temp paths they themselves create.
      - path: _test\.go
        linters: [gosec]
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gosec
    - errorlint
    - contextcheck
  settings:
    revive:
      rules:
        - name: package-comments

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true
