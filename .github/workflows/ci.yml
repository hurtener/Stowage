name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: stowage
          POSTGRES_PASSWORD: stowage
          POSTGRES_DB: stowage
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      STOWAGE_TEST_PG_DSN: postgres://stowage:stowage@localhost:5432/stowage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build (CGo-free)
        run: make build
      - name: Vet
        run: make vet
      - name: Test (-race)
        run: make test
      - name: Coverage
        run: make coverage
      - name: Eval CI gate (Phase 13)
        run: make eval-ci

  harbor-adapter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build Harbor adapter
        working-directory: adapters/harbor
        run: go build ./...
      - name: Test Harbor adapter
        working-directory: adapters/harbor
        run: go test -count=1 -timeout=60s ./...

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mirror (AGENTS.md == CLAUDE.md)
        run: make check-mirror
      - name: Drift audit
        run: make drift-audit

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
